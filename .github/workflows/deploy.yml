name: CI/CD Pipeline - Infrastructure and Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Provision & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">= 1.2.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: deployment/terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: deployment/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: deployment/terraform
        run: terraform plan -no-color

      - name: Terraform Apply
        working-directory: deployment/terraform
        run: terraform apply -auto-approve

      - name: Extract Terraform Outputs
        id: tf_outputs
        working-directory: deployment/terraform
        run: |
          S3_BUCKET=$(terraform output -raw s3_bucket_name)
          DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build Frontend
        working-directory: app/frontend
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync app/frontend/dist s3://${{ steps.tf_outputs.outputs.s3_bucket }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ steps.tf_outputs.outputs.distribution_id }} --paths "/*"
